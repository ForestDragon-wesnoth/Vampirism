#textdomain wesnoth-units

#define GARGOYLE_STANDING_ANIM DRAKE_NAME
    [standing_anim]
        [frame]
            image="units/drakes/{DRAKE_NAME}.png:50"
            image_mod="~GS()"
        [/frame]
    [/standing_anim]
    [standing_anim]
        start_time=0
        terrain_type={DRAKE_UNWALKABLE_TERRAINS}
        submerge=0.01
        # wmlscope: start ignoring
        [frame]
            image="units/drakes/{DRAKE_NAME}-fly-[1~5,4].png:100"
            image_mod="~GS()"
        [/frame]
        [frame]
            image="units/drakes/{DRAKE_NAME}-fly-[3,2]-upstroke.png:100"
            image_mod="~GS()"
        [/frame]
        # wmlscope: stop ignoring
    [/standing_anim]
    [pre_movement_anim]
        start_time=0
        terrain_type=!,{DRAKE_UNWALKABLE_TERRAINS}
        [frame]
            image="units/drakes/{DRAKE_NAME}-takeoff-[1~4].png:50"
            image_mod="~GS()"
        [/frame]
    [/pre_movement_anim]
    [movement_anim]
        start_time=0
        submerge=0.01
        # wmlscope: start ignoring
        [frame]
            image="units/drakes/{DRAKE_NAME}-fly-[1~5,4].png:100"
            image_mod="~GS()"
        [/frame]
        [frame]
            image="units/drakes/{DRAKE_NAME}-fly-[3,2]-upstroke.png:100"
            image_mod="~GS()"
        [/frame]
        # wmlscope: stop ignoring
    [/movement_anim]
    [post_movement_anim]
        terrain_type=!,{DRAKE_UNWALKABLE_TERRAINS}
        start_time=0
        [frame]
            image="units/drakes/{DRAKE_NAME}-takeoff-[4~1].png:100"
            image_mod="~GS()"
        [/frame]
    [/post_movement_anim]
#enddef

#define GARGOYLE_MOVEMENT_ANIM DRAKE_NAME
    [movement_anim]
        start_time=0
        # wmlscope: start ignoring
        [frame]
            image="units/drakes/{DRAKE_NAME}-fly-[1~5,4].png:100,units/drakes/{DRAKE_NAME}-fly-[3,2]-upstroke.png:100"
            image_mod="~GS()"
        [/frame]
        # wmlscope: stop ignoring
    [/movement_anim]
#enddef

#define GARGOYLE_WEAPON_ANIM DRAKE_NAME
    [draw_weapon_anim]
        #landing, only do it when we're not already flying
        terrain_type={DRAKE_UNWALKABLE_TERRAINS}
        [frame]
            image="units/drakes/{DRAKE_NAME}-takeoff-[4~1].png:100"
            image_mod="~GS()"
        [/frame]
    [/draw_weapon_anim]
    [sheath_weapon_anim]
        #landing, only do it when we're not already flying
        terrain_type={DRAKE_UNWALKABLE_TERRAINS}
        [frame]
            image="units/drakes/{DRAKE_NAME}-takeoff-[1~4].png:100"
            image_mod="~GS()"
        [/frame]
    [/sheath_weapon_anim]
#enddef

[unit_type]
    id=Vampirism_Gargoyle
    name= _ "Gargoyle"
    race=monster
    {TRAIT_ELEMENTAL}
    gender=male
    image="units/drakes/burner.png~GS()"
    profile="portraits/drakes/burner.webp~GS()"
    hitpoints=43
    movement_type=drakefly
    movement=6
    experience=42
    level=1
    alignment=neutral
    advances_to=Vampirism_Gargoyle_Guardian
    cost=21
    usage=fighter
    description= _ "Gargoyles are often summoned to guard vampires during the day."
    die_sound=lich-die.ogg
    {DEFENSE_ANIM "units/drakes/burner-defend-2.png~GS()" "units/drakes/burner-defend-1.png~GS()" {SOUND_LIST:SKELETON_BIG_HIT} }
    {GARGOYLE_STANDING_ANIM burner}
    {GARGOYLE_MOVEMENT_ANIM burner}
    {GARGOYLE_WEAPON_ANIM burner}
    [resistance]
        blade=60
        pierce=40
        impact=90
        cold=40
        fire=80
        arcane=140
    [/resistance]
    #gargoyles are stone creatures, they can navigate caves more easily than drakes can (2 cost instead of 3). and since they are gargoyles, they get bonus castle defense
    [movement_costs]
        cave=1
        fungus=1
    [/movement_costs]
    [defense]
        castle=50
        cave=60
    [/defense]

    [attack]
        name=claws
        description=_"claws"
        icon="attacks/claws-drake.png~GS()"
        type=blade
        range=melee
        damage=8
        number=3
    [/attack]
    [attack]
        name=slam
        description=_"slam"
        type=impact
        range=melee
        damage=10
        number=2
        icon="attacks/slam-drake.png~GS()"
    [/attack]
    [attack_anim]
        [filter_attack]
            name=claws
        [/filter_attack]
        offset=0.0~0.2,0.2~0.7,0.7~0.2,0.2~0.0
        start_time=-300
        [frame]
            image="units/drakes/burner.png~GS()"
        [/frame]
        [frame]
            image="units/drakes/burner-melee-[1~6].png~GS():100"
        [/frame]
        {SOUND:HIT_AND_MISS claws.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/drakes/burner.png~GS()"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=slam
        [/filter_attack]
        offset=0.0~0.2,0.2~0.7,0.7~0.2,0.2~0.0
        start_time=-400
        [frame]
            duration=800
            image="units/drakes/burner-takeoff-[1~4,4~1].png~GS():100"
        [/frame]
        {SOUND:HIT_AND_MISS club.ogg {SOUND_LIST:MISS} -200}
    [/attack_anim]
[/unit_type]

